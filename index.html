<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBLVNT | Rebel Ventures 🏴‍☠️</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { 
      --neon-cyan: #00f0ff; 
      --neon-pink: #ff00aa; 
      --neon-purple: #8a2be2; 
      --glitch: #ff3366; 
    }
    body { 
      margin:0; padding:0; 
      font-family:'Segoe UI',sans-serif; 
      background:linear-gradient(135deg,#0a0015,#150033); 
      color:#e0e0e0; 
      min-height:100vh; 
      overflow-x:hidden; 
    }
    nav { 
      background:rgba(0,0,0,0.85); 
      padding:1.2rem; 
      text-align:center; 
      border-bottom:3px solid var(--neon-cyan); 
      position:sticky; top:0; z-index:100; 
      backdrop-filter:blur(8px); 
    }
    nav a { 
      color:var(--neon-cyan); 
      margin:0 25px; 
      text-decoration:none; 
      font-weight:bold; 
      font-size:1.2rem; 
    }
    nav a:hover { 
      text-shadow:0 0 20px var(--neon-cyan); 
      transform:scale(1.1); 
      display:inline-block; 
    }
    .hero { 
      text-align: center; 
      padding: 80px 20px 60px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
    }
    .logo-img { 
      max-width: 1100px; 
      height: auto; 
      display: block; 
      margin: 0 auto 40px auto; 
      filter: drop-shadow(0 0 120px var(--neon-cyan)); 
      transition: all 0.4s ease; 
    }
    .logo-img:hover { 
      transform: scale(1.06); 
      animation: glitch 1s infinite alternate; 
      filter: drop-shadow(0 0 160px var(--neon-pink)) brightness(1.4); 
    }
    @keyframes glitch {
      0% { transform: translate(0, 0) scale(1.06); }
      20% { transform: translate(-8px, 8px) scale(1.06); }
      40% { transform: translate(8px, -8px) scale(1.06); }
      60% { transform: translate(-8px, 0) scale(1.06); }
      80% { transform: translate(8px, 8px) scale(1.06); }
      100% { transform: translate(0, 0) scale(1.06); }
    }
    h1 { 
      font-size: 7rem; 
      margin: 0 0 20px 0; 
      color: var(--neon-cyan); 
      text-shadow: 0 0 80px var(--neon-cyan), 0 0 160px var(--neon-purple); 
      letter-spacing: 8px; 
      line-height: 1; 
    }
    .tagline { 
      font-size: 2.8rem; 
      color: var(--neon-pink); 
      text-shadow: 0 0 50px var(--neon-pink); 
      margin: 0; 
    }
    .links-section { 
      padding: 80px 20px 120px; 
      max-width: 1200px; 
      margin: 0 auto; 
      text-align: center; 
    }
    .links-title { 
      color: var(--neon-pink); 
      font-size: 4.5rem; 
      margin-bottom: 70px; 
      text-shadow: 0 0 60px var(--neon-pink); 
    }
    .links { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); 
      gap: 50px; 
    }
    .link-card { 
      background: rgba(255,255,255,0.04); 
      padding: 60px 35px; 
      border-radius: 30px; 
      border: 4px solid var(--neon-pink); 
      transition: all 0.5s ease; 
      backdrop-filter: blur(8px); 
    }
    .link-card:hover { 
      transform: translateY(-20px) scale(1.05); 
      box-shadow: 0 0 100px var(--neon-pink); 
      border-color: var(--neon-cyan); 
    }
    .link-card i { 
      font-size: 6rem; 
      margin-bottom: 30px; 
    }
    .link-card h3 { 
      font-size: 2.5rem; 
      margin: 20px 0 15px; 
    }
    .link-card p { 
      font-size: 1.5rem; 
      opacity: 0.9; 
    }
    footer { 
      text-align: center; 
      padding: 100px 20px 60px; 
      opacity: 0.6; 
      font-size: 1.2rem; 
      border-top: 1px solid var(--neon-purple); 
    }
  </style>
</head>
<body>
  <nav>
    <a href="https://x.com/sovereignmethod" target="_blank">@sovereignmethod 🏴‍☠️</a>
  </nav>

  <section class="hero">
    <img src="ship-logo.png" alt="RBLVNT Neon Pirate Ship Logo" class="logo-img">
    <h1>REBEL VENTURES</h1>
    <p class="tagline">Sailing the storm • Owning the chain • Building empires 🏴‍☠️</p>
  </section>

  <section class="links-section">
    <h2 class="links-title">REBEL ARMORY</h2>
    <div class="links">
      <a href="https://grok.x.ai" target="_blank" class="link-card">
        <i class="fas fa-robot"></i>
        <h3>Grok</h3>
        <p>xAI truth machine – no bullshit</p>
      </a>
      <a href="https://www.luxalgo.com/chat/" target="_blank" class="link-card">
        <i class="fas fa-chart-line"></i>
        <h3>LuxAlgo Chat</h3>
        <p>AI trading alpha – elite signals</p>
      </a>
      <a href="https://www.cnbc.com/bitcoin/" target="_blank" class="link-card">
        <i class="fas fa-newspaper"></i>
        <h3>CNBC Bitcoin</h3>
        <p>Mainstream chaos coverage</p>
      </a>
    </div>
  </section>

  <footer>
    © 2026 Rebel Ventures • BottomG 🏴‍☠️ • Pure rebellion
  </footer>
</body>
</html>
